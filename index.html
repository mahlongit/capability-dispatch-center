<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CD-Center</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: light;
      --bg: #faf9f5;
      --bg-2: #f4eee4;
      --panel: #fffaf3;
      --panel-2: #f6f0e7;
      --panel-3: #ece3d7;
      --ink: #171614;
      --ink-2: #3d3d3a;
      --muted: #6c6a64;
      --line: #e6dfd8;
      --accent: #cc785c;
      --accent-2: #a9583e;
      --chip: #f4ece0;
      --warn: #b98634;
      --success: #5db872;
      --shadow: 0 14px 36px rgba(62, 41, 19, .10);
      --font-display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      --font-body: "SF Pro Text", "Inter", system-ui, sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, monospace;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0b0d12;
      --bg-2: #121621;
      --panel: #121722;
      --panel-2: #171d2a;
      --panel-3: #20283a;
      --ink: #eef2ff;
      --ink-2: #d5ddf6;
      --muted: #8f9bb8;
      --line: #293244;
      --accent: #7487ff;
      --accent-2: #96a7ff;
      --chip: #1a2130;
      --warn: #c8a03d;
      --success: #2bb673;
      --shadow: 0 16px 44px rgba(0, 0, 0, .28);
      --font-display: "SF Pro Display", "Inter", system-ui, sans-serif;
      --font-body: "SF Pro Text", "Inter", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(204, 120, 92, .12), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--ink);
      font: 14px/1.5 var(--font-body);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 264px minmax(0, 1fr) 360px;
      grid-template-rows: 72px minmax(0, 1fr);
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(250, 249, 245, .88);
      backdrop-filter: blur(16px);
    }
    :root[data-theme="dark"] .topbar { background: rgba(10, 12, 18, .82); }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(180deg, var(--panel-3), var(--panel));
      border: 1px solid var(--line);
      font: 700 18px/1 var(--font-display);
    }

    .brand h1 {
      margin: 0;
      font: 600 21px/1.1 var(--font-display);
      letter-spacing: -.02em;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .seg,
    .theme-toggle {
      display: inline-grid;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
    }

    .seg {
      grid-template-columns: 132px 76px 76px;
    }

    .theme-toggle {
      grid-template-columns: 56px 56px;
    }

    .lang-toggle {
      display: inline-grid;
      grid-template-columns: 56px 56px;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
    }

    .seg button,
    .theme-toggle button,
    .lang-toggle button {
      min-height: 38px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
    }

    .seg button.active,
    .theme-toggle button.active,
    .lang-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    .sidebar,
    .main,
    .detail {
      min-width: 0;
      min-height: 0;
      padding: 18px;
    }

    .sidebar {
      padding-left: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .detail {
      padding-right: 24px;
      overflow: hidden;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      min-height: 0;
    }

    .panel-title {
      padding: 16px 16px 0;
      color: var(--muted);
      font: 600 12px/1.2 var(--font-display);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .scene-list {
      padding: 12px;
      display: grid;
      gap: 8px;
      overflow: auto;
      min-height: 0;
    }

    .scene-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      padding: 12px 14px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      text-align: left;
    }

    .scene-btn.active {
      background: rgba(116, 135, 255, .14);
      color: var(--ink);
    }

    .scene-count {
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .storage {
      padding: 14px;
    }

    .storage p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .storage-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .storage-box {
      padding: 12px;
      border-radius: 12px;
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .storage-box strong {
      display: block;
      font: 600 15px/1.1 var(--font-display);
      overflow-wrap: anywhere;
    }

    .storage-box span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 12px;
      flex: none;
    }

    .controls-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      flex: none;
    }

    .sort-panel {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      background: var(--panel);
    }

    .sort-label {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .sort-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sort-buttons button,
    .sort-direction {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--muted);
      font-weight: 600;
    }

    .sort-buttons button.active,
    .sort-direction.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .searchbox,
    .hint {
      min-height: 52px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .searchbox {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      background: var(--panel);
    }

    .searchbox input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
    }

    .hint {
      display: flex;
      align-items: center;
      padding: 0 14px;
      background: rgba(200, 160, 61, .10);
      color: var(--warn);
      font-size: 13px;
    }

    .cards {
      display: grid;
      gap: 14px;
      overflow: auto;
      min-height: 0;
      padding-right: 4px;
    }

    .card {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .card:hover,
    .card.active {
      border-color: var(--accent);
      background: var(--panel-2);
    }

    .icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(180deg, var(--panel-3), var(--panel));
      border: 1px solid var(--line);
      font: 700 18px/1 var(--font-display);
    }

    .card h3 {
      margin: 0 0 4px;
      font: 600 21px/1.08 var(--font-display);
      letter-spacing: -.03em;
    }

    .skill-id {
      margin-bottom: 10px;
      color: var(--muted);
      font: 12px/1.45 var(--font-mono);
    }

    .card p {
      margin: 0 0 12px;
      color: var(--ink-2);
      font-size: 14px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .score {
      color: var(--accent-2);
      font: 600 28px/1 var(--font-display);
      font-variant-numeric: tabular-nums;
    }

    .detail-panel {
      padding: 18px;
      height: 100%;
      overflow: auto;
    }

    .detail-kicker {
      color: var(--accent-2);
      font: 600 12px/1.2 var(--font-display);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .detail-panel h2 {
      margin: 10px 0 6px;
      font: 600 28px/1.06 var(--font-display);
      letter-spacing: -.04em;
    }

    .detail-id {
      margin-bottom: 12px;
      color: var(--muted);
      font: 12px/1.45 var(--font-mono);
    }

    .detail-panel p {
      margin: 0;
      color: var(--ink-2);
      font-size: 15px;
    }

    .block {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .block h3 {
      margin: 0 0 10px;
      font: 600 13px/1.2 var(--font-display);
      color: var(--ink);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .prompt {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #0d1118;
      color: #dce6ff;
      font: 12px/1.7 var(--font-mono);
      white-space: pre-wrap;
    }

    .copy {
      width: 100%;
      min-height: 42px;
      margin-top: 12px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .copy:hover {
      background: var(--accent-2);
    }

    .style-note {
      padding: 12px;
      border-radius: 12px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--ink-2);
      font-size: 13px;
    }

    .style-note strong {
      color: var(--ink);
    }

    .source-meta {
      padding: 14px;
    }

    .source-meta p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .meta-list {
      display: grid;
      gap: 8px;
    }

    .meta-item {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
    }

    .meta-item strong {
      display: block;
      color: var(--ink);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .meta-item span {
      color: var(--muted);
      font-size: 11px;
      word-break: break-word;
      line-height: 1.45;
    }

    .source-list {
      margin-top: 10px;
      display: grid;
      gap: 6px;
    }

    .source-entry {
      padding: 8px 10px;
      border-radius: 10px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      word-break: break-word;
    }

    @media (max-width: 1180px) {
      body {
        height: auto;
        overflow: auto;
      }

      .app {
        grid-template-columns: 240px minmax(0, 1fr);
        grid-template-rows: 72px minmax(0, 1fr);
        height: auto;
      }

      .detail {
        grid-column: 1 / -1;
      }

      .detail-panel,
      .cards,
      .scene-list {
        overflow: visible;
        height: auto;
      }
    }

    @media (max-width: 760px) {
      .app {
        display: block;
      }

      .topbar,
      .sidebar,
      .main,
      .detail {
        padding-left: 16px;
        padding-right: 16px;
      }

      .toolbar,
      .search-row,
      .topbar {
        grid-template-columns: 1fr;
      }

      .toolbar {
        flex-wrap: wrap;
      }

      .seg {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .card {
        grid-template-columns: 48px minmax(0, 1fr);
      }

      .score {
        grid-column: 2;
      }
    }

    @media (max-width: 560px) {
      .sidebar,
      .main,
      .detail {
        padding-top: 14px;
        padding-bottom: 14px;
      }

      .storage-grid {
        grid-template-columns: 1fr;
      }

      .storage-box {
        min-height: 88px;
      }

      .scene-btn {
        padding: 10px 12px;
      }

      .sort-panel {
        min-height: auto;
        align-items: flex-start;
        padding: 12px;
        flex-direction: column;
      }

      .sort-buttons {
        width: 100%;
      }

      .sort-buttons button,
      .sort-direction {
        min-height: 32px;
        font-size: 12px;
      }

      .card {
        padding: 14px;
      }

      .card h3 {
        font-size: 17px;
        line-height: 1.15;
      }

      .card p {
        font-size: 13px;
      }

      .detail-panel h2 {
        font-size: 20px;
      }

      .detail-panel p,
      .style-note,
      .prompt {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">A</div>
        <div>
          <h1>CD-Center</h1>
          <p id="brandSubtitle">通用能力调度台。左边按场景筛选，中间选择能力，右边复制调用提示。</p>
        </div>
      </div>
      <div class="toolbar">
        <div class="seg" aria-label="运行环境切换">
          <button class="active" data-env="all" id="envAll">全部能力</button>
          <button data-env="local" id="envLocal">本地</button>
          <button data-env="remote" id="envRemote">远程</button>
        </div>
        <div class="lang-toggle" aria-label="语言切换">
          <button class="active" data-lang="zh">中</button>
          <button data-lang="en">En</button>
        </div>
        <div class="theme-toggle" aria-label="主题切换">
          <button data-theme="dark" id="themeDark">黑</button>
          <button class="active" data-theme="light" id="themeLight">白</button>
        </div>
      </div>
    </header>

    <aside class="sidebar">
      <div class="panel" style="display:flex;flex-direction:column;min-height:0">
        <div class="panel-title" id="sceneTitle">场景</div>
        <div class="scene-list" id="sceneList"></div>
      </div>
      <div class="panel storage">
        <div class="panel-title" style="padding:0 0 12px" id="scopeTitle">范围说明</div>
        <p id="scopeText">`全部能力` 会展示本地、远程和共享能力。筛选只改变视图，不会触发任何执行。</p>
        <div class="storage-grid">
          <div class="storage-box"><strong id="boxLocalTitle">本地</strong><span id="boxLocalText">本机脚本或工具</span></div>
          <div class="storage-box"><strong id="boxRemoteTitle">远程</strong><span id="boxRemoteText">API 或托管服务</span></div>
          <div class="storage-box"><strong id="boxSharedTitle">共享</strong><span id="boxSharedText">两类环境均可用</span></div>
          <div class="storage-box"><strong id="boxReadonlyTitle">只读</strong><span id="boxReadonlyText">选择能力不执行</span></div>
        </div>
      </div>
      <div class="panel source-meta">
        <div class="panel-title" style="padding:0 0 12px" id="sourceTitle">当前数据源</div>
        <p id="registryStatus">启动中，正在检查本机扫描结果。</p>
        <div class="meta-list">
          <div class="meta-item"><strong id="registryModeLabel">数据模式</strong><span id="registryMode">自动检测</span></div>
          <div class="meta-item"><strong id="registryCountLabel">能力数量</strong><span id="registryCount">-</span></div>
          <div class="meta-item"><strong id="registryTimeLabel">扫描时间</strong><span id="registryTime">-</span></div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="search-row">
        <label class="searchbox">
          <span>⌕</span>
          <input id="search" autocomplete="off" placeholder="搜索任务、能力或标识，例如：改 UI、网页调研、视频生成、代码审查" />
        </label>
        <div class="hint" id="hintText">默认优先加载 `capability-registry.local.json`，找不到时再回退到示例库。</div>
      </div>
      <div class="controls-row">
        <div class="sort-panel">
          <span class="sort-label" id="sortLabel">排序</span>
          <div class="sort-buttons">
            <button class="active" data-sort="recent" id="sortRecent">最近使用</button>
            <button data-sort="installed" id="sortInstalled">安装时间</button>
            <button data-sort="name" id="sortName">名称</button>
          </div>
          <button class="sort-direction" id="sortDirection" data-direction="desc">↓</button>
        </div>
      </div>
      <div class="cards" id="cards"></div>
    </main>

    <aside class="detail">
      <div class="panel detail-panel" id="detail"></div>
    </aside>
  </div>

  <script>
    const themes = {
      dark: {
        vars: {
          "--bg":"#0b0d12","--bg-2":"#121621","--panel":"#121722","--panel-2":"#171d2a","--panel-3":"#20283a",
          "--ink":"#eef2ff","--ink-2":"#d5ddf6","--muted":"#8f9bb8","--line":"#293244","--accent":"#7487ff","--accent-2":"#96a7ff","--chip":"#1a2130","--warn":"#c8a03d","--success":"#2bb673"
        }
      },
      light: {
        vars: {
          "--bg":"#f4f6fb","--bg-2":"#edf1f8","--panel":"#ffffff","--panel-2":"#f8faff","--panel-3":"#eef3ff",
          "--ink":"#121722","--ink-2":"#2b3240","--muted":"#687389","--line":"#d8dfec","--accent":"#5d6ff0","--accent-2":"#4a5de2","--chip":"#f0f4fc","--warn":"#9b6d05","--success":"#128250"
        }
      }
    };

    let capabilities = [];
    let registryMeta = null;
    let registrySource = "auto";
    let activeEnv = "all";
    let activeScene = "全部";
    let activeTheme = "light";
    let activeLang = "zh";
    let sortBy = "recent";
    let sortDirection = "desc";
    let selected = null;

    const sceneKeys = ["全部", "UI / 前端", "代码 / 后端", "网页 / 自动化", "视频 / 内容", "知识 / 记忆", "部署"];

    const translations = {
      zh: {
        brandSubtitle: "通用能力调度台。左边按场景筛选，中间选择能力，右边复制调用提示。",
        envAll: "全部能力",
        envLocal: "本地",
        envRemote: "远程",
        themeDark: "黑",
        themeLight: "白",
        sceneTitle: "场景",
        scopeTitle: "范围说明",
        scopeText: "`全部能力` 会展示本地、远程和共享能力。筛选只改变视图，不会触发任何执行。",
        boxLocalTitle: "本地",
        boxLocalText: "本机脚本或工具",
        boxRemoteTitle: "远程",
        boxRemoteText: "API 或托管服务",
        boxSharedTitle: "共享",
        boxSharedText: "两类环境均可用",
        boxReadonlyTitle: "只读",
        boxReadonlyText: "选择能力不执行",
        sourceTitle: "当前数据源",
        registryModeLabel: "数据模式",
        registryCountLabel: "能力数量",
        registryTimeLabel: "扫描时间",
        searchPlaceholder: "搜索任务、能力或标识，例如：改 UI、网页调研、视频生成、代码审查",
        hintLocal: "当前页面来自本机扫描结果。重新扫描后刷新页面即可更新。",
        hintExample: "当前页面来自示例库。运行 `python3 scripts/scan_capabilities.py` 或 `cd-center scan` 后刷新即可切到本机结果。",
        statusLocal: "已加载本机扫描结果。打开页面前应先运行扫描。",
        statusExample: "未发现本机扫描结果，当前展示仓库自带示例库。",
        modeLocal: "本机扫描结果",
        modeExample: "示例库",
        sortLabel: "排序",
        sortRecent: "最近使用",
        sortInstalled: "安装时间",
        sortName: "名称",
        noMatch: "没有匹配能力。换一个关键词或场景再试。",
        detailTitle: "能力详情",
        detailEmpty: "没有可用能力",
        sourceBlock: "发现来源",
        sourceHosts: "可用宿主",
        routingNote: "路由提示",
        promptBlock: "推荐调用提示",
        copyButton: "复制调用提示",
        copiedButton: "已复制",
        themeBlock: "当前主题",
        themeZhDark: "黑色主题",
        themeZhLight: "白色主题",
        themeNote: "这里只保留黑 / 白两套，不再让你选一堆风格层级。",
        subskillNote: "建议：这是父级能力或工具箱。执行前先判断是否要继续细分到子 skill / 子规则 / 子代理。",
        sceneLabels: {
          "全部": "全部",
          "UI / 前端": "UI / 前端",
          "代码 / 后端": "代码 / 后端",
          "网页 / 自动化": "网页 / 自动化",
          "视频 / 内容": "视频 / 内容",
          "知识 / 记忆": "知识 / 记忆",
          "部署": "部署"
        }
      },
      en: {
        brandSubtitle: "Capability router. Filter on the left, inspect in the middle, copy the routing prompt on the right.",
        envAll: "All",
        envLocal: "Local",
        envRemote: "Remote",
        themeDark: "Dark",
        themeLight: "Light",
        sceneTitle: "Scenes",
        scopeTitle: "Scope",
        scopeText: "`All` shows local, remote, and shared capabilities. Filters only change the view and never execute anything.",
        boxLocalTitle: "Local",
        boxLocalText: "Local scripts or tools",
        boxRemoteTitle: "Remote",
        boxRemoteText: "APIs or hosted services",
        boxSharedTitle: "Shared",
        boxSharedText: "Works in both contexts",
        boxReadonlyTitle: "Read-only",
        boxReadonlyText: "Selection does not execute",
        sourceTitle: "Data Source",
        registryModeLabel: "Mode",
        registryCountLabel: "Count",
        registryTimeLabel: "Scanned At",
        searchPlaceholder: "Search task, capability, or id. Example: UI polish, web research, video generation, code review",
        hintLocal: "This page is using the local scanned registry. Rescan and refresh to update it.",
        hintExample: "This page is using the example registry. Run `python3 scripts/scan_capabilities.py` or `cd-center scan`, then refresh to load local results.",
        statusLocal: "Loaded from the local scanned registry. Scan before using the page.",
        statusExample: "No local scan result was found. The page is showing the repository example registry.",
        modeLocal: "Local scan result",
        modeExample: "Example registry",
        sortLabel: "Sort",
        sortRecent: "Recent use",
        sortInstalled: "Installed",
        sortName: "Name",
        noMatch: "No matching capability. Try another search or scene.",
        detailTitle: "Capability Detail",
        detailEmpty: "No capability available",
        sourceBlock: "Discovered From",
        sourceHosts: "Available In",
        routingNote: "Routing Note",
        promptBlock: "Recommended Prompt",
        copyButton: "Copy prompt",
        copiedButton: "Copied",
        themeBlock: "Theme",
        themeZhDark: "Dark theme",
        themeZhLight: "Light theme",
        themeNote: "Only two themes are kept here. No extra theme layers.",
        subskillNote: "Suggestion: this looks like a parent capability or toolkit. Check whether you should route further into child skills, rules, or sub-agents first.",
        sceneLabels: {
          "全部": "All",
          "UI / 前端": "UI / Frontend",
          "代码 / 后端": "Code / Backend",
          "网页 / 自动化": "Web / Automation",
          "视频 / 内容": "Video / Content",
          "知识 / 记忆": "Knowledge / Memory",
          "部署": "Deployment"
        }
      }
    };

    const sceneList = document.getElementById("sceneList");
    const cards = document.getElementById("cards");
    const detail = document.getElementById("detail");
    const search = document.getElementById("search");
    const registryStatus = document.getElementById("registryStatus");
    const registryMode = document.getElementById("registryMode");
    const registryCount = document.getElementById("registryCount");
    const registryTime = document.getElementById("registryTime");
    const hintText = document.getElementById("hintText");
    const sortDirectionButton = document.getElementById("sortDirection");

    function t(key) {
      return translations[activeLang][key];
    }

    function capabilityName(item) {
      return activeLang === "en" ? (item.displayNameEn || item.displayName || item.name) : (item.displayName || item.displayNameEn || item.name);
    }

    function capabilityDesc(item) {
      return activeLang === "en" ? (item.descEn || item.desc || "") : (item.desc || item.descEn || "");
    }

    function capabilityPrompt(item) {
      return activeLang === "en" ? (item.promptEn || item.prompt || "") : (item.prompt || item.promptEn || "");
    }

    function usageStorageKey(item) {
      return `cd-center:last-used:${item.name}:${item.host || "unknown"}`;
    }

    function getLastUsed(item) {
      return Number(window.localStorage.getItem(usageStorageKey(item)) || 0);
    }

    function markUsed(item) {
      window.localStorage.setItem(usageStorageKey(item), String(Date.now()));
    }

    function applyTheme(themeName) {
      activeTheme = themeName;
      document.documentElement.setAttribute("data-theme", themeName);
      Object.entries(themes[themeName].vars).forEach(([key, value]) => document.documentElement.style.setProperty(key, value));
      document.querySelectorAll(".theme-toggle button").forEach(btn => btn.classList.toggle("active", btn.dataset.theme === themeName));
    }

    function updateStaticText() {
      document.getElementById("brandSubtitle").textContent = t("brandSubtitle");
      document.getElementById("envAll").textContent = t("envAll");
      document.getElementById("envLocal").textContent = t("envLocal");
      document.getElementById("envRemote").textContent = t("envRemote");
      document.getElementById("themeDark").textContent = t("themeDark");
      document.getElementById("themeLight").textContent = t("themeLight");
      document.getElementById("sceneTitle").textContent = t("sceneTitle");
      document.getElementById("scopeTitle").textContent = t("scopeTitle");
      document.getElementById("scopeText").textContent = t("scopeText");
      document.getElementById("boxLocalTitle").textContent = t("boxLocalTitle");
      document.getElementById("boxLocalText").textContent = t("boxLocalText");
      document.getElementById("boxRemoteTitle").textContent = t("boxRemoteTitle");
      document.getElementById("boxRemoteText").textContent = t("boxRemoteText");
      document.getElementById("boxSharedTitle").textContent = t("boxSharedTitle");
      document.getElementById("boxSharedText").textContent = t("boxSharedText");
      document.getElementById("boxReadonlyTitle").textContent = t("boxReadonlyTitle");
      document.getElementById("boxReadonlyText").textContent = t("boxReadonlyText");
      document.getElementById("sourceTitle").textContent = t("sourceTitle");
      document.getElementById("registryModeLabel").textContent = t("registryModeLabel");
      document.getElementById("registryCountLabel").textContent = t("registryCountLabel");
      document.getElementById("registryTimeLabel").textContent = t("registryTimeLabel");
      search.placeholder = t("searchPlaceholder");
      document.getElementById("sortLabel").textContent = t("sortLabel");
      document.getElementById("sortRecent").textContent = t("sortRecent");
      document.getElementById("sortInstalled").textContent = t("sortInstalled");
      document.getElementById("sortName").textContent = t("sortName");
      document.querySelectorAll(".lang-toggle button").forEach(btn => btn.classList.toggle("active", btn.dataset.lang === activeLang));
    }

    function normalizeRegistry(payload, sourceLabel) {
      if (Array.isArray(payload)) {
        return {
          capabilities: payload,
          meta: {
            label: sourceLabel,
            mode: sourceLabel === "local" ? "local" : "example",
            capabilityCount: payload.length
          }
        };
      }
      return {
        capabilities: Array.isArray(payload.capabilities) ? payload.capabilities : [],
        meta: {
          ...payload.meta,
          label: sourceLabel,
          mode: sourceLabel === "local" ? "local" : "example"
        }
      };
    }

    function updateRegistryMeta() {
      const count = registryMeta?.capabilityCount ?? capabilities.length;
      registryStatus.textContent = registrySource === "local"
        ? t("statusLocal")
        : t("statusExample");
      registryMode.textContent = registrySource === "local" ? t("modeLocal") : t("modeExample");
      registryCount.textContent = String(count);
      registryTime.textContent = registryMeta?.generatedAt || "-";
      hintText.textContent = registrySource === "local"
        ? t("hintLocal")
        : t("hintExample");
    }

    async function fetchRegistry(url, sourceLabel) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`${sourceLabel}:${response.status}`);
      }
      const payload = await response.json();
      return normalizeRegistry(payload, sourceLabel);
    }

    async function loadRegistry() {
      const params = new URLSearchParams(window.location.search);
      const forcedSource = params.get("source");
      let registry;
      if (forcedSource === "example") {
        registry = await fetchRegistry("./capability-registry.public.json", "example");
        registrySource = "example";
      } else if (forcedSource === "local") {
        registry = await fetchRegistry("./capability-registry.local.json", "local");
        registrySource = "local";
      } else {
        try {
          registry = await fetchRegistry("./capability-registry.local.json", "local");
          registrySource = "local";
        } catch (_error) {
          registry = await fetchRegistry("./capability-registry.public.json", "example");
          registrySource = "example";
        }
      }
      capabilities = registry.capabilities;
      registryMeta = registry.meta;
      selected = capabilities[0] || null;
      updateRegistryMeta();
      renderAll();
    }

    function normalizeSceneLabel(item) {
      const category = item.cat || "";
      if (category === "UI / Frontend") return "UI / 前端";
      if (category === "Code / Backend") return "代码 / 后端";
      if (category === "Web / Automation") return "网页 / 自动化";
      if (category === "Video / Content") return "视频 / 内容";
      if (category === "Knowledge / Memory") return "知识 / 记忆";
      if (category === "Deployment") return "部署";
      return category;
    }

    function filtered() {
      const q = search.value.trim().toLowerCase();
      const list = capabilities.filter(item => {
        const normalizedCategory = normalizeSceneLabel(item);
	        const envOk = activeEnv === "all" || item.env.includes(activeEnv) || item.env.includes("shared");
        const sceneOk = activeScene === "全部" || normalizedCategory === activeScene;
        const qOk = !q || [item.name, item.displayName, item.displayNameEn || "", item.desc || "", item.descEn || "", item.cat, item.sourceType || "", item.host || "", item.sourcePath || "", ...(item.availableIn || []), ...item.tags].join(" ").toLowerCase().includes(q);
        return envOk && sceneOk && qOk;
      });
      const direction = sortDirection === "asc" ? 1 : -1;
      return list.sort((a, b) => {
        if (sortBy === "name") {
          return capabilityName(a).localeCompare(capabilityName(b), activeLang === "en" ? "en" : "zh") * direction;
        }
        if (sortBy === "installed") {
          const aTime = Date.parse(a.installedAt || 0) || 0;
          const bTime = Date.parse(b.installedAt || 0) || 0;
          return (aTime - bTime) * direction;
        }
        const aUsed = getLastUsed(a);
        const bUsed = getLastUsed(b);
        if (aUsed !== bUsed) {
          return (aUsed - bUsed) * direction;
        }
        const aInstalled = Date.parse(a.installedAt || 0) || 0;
        const bInstalled = Date.parse(b.installedAt || 0) || 0;
        return (aInstalled - bInstalled) * direction;
      });
    }

    function renderScenes() {
      sceneList.innerHTML = sceneKeys.map((label) => {
        const test = label === "全部" ? (() => true) : ((item) => normalizeSceneLabel(item) === label);
        const count = capabilities.filter(item => {
          const envOk = activeEnv === "all" || item.env.includes(activeEnv) || item.env.includes("shared");
          return envOk && test(item);
        }).length;
        return `<button class="scene-btn ${label === activeScene ? "active" : ""}" data-scene="${label}"><span>${translations[activeLang].sceneLabels[label] || label}</span><span class="scene-count">${count}</span></button>`;
      }).join("");
      document.querySelectorAll(".scene-btn").forEach(btn => btn.addEventListener("click", () => {
        activeScene = btn.dataset.scene;
        const first = filtered()[0];
        if (first) selected = first;
        renderAll();
      }));
    }

    function renderCards() {
      const list = filtered();
      cards.innerHTML = list.map(item => `
        <article class="card ${selected && item.name === selected.name ? "active" : ""}" data-name="${item.name}">
          <div class="icon">${item.icon}</div>
          <div>
            <h3>${capabilityName(item)}</h3>
            <div class="skill-id">${item.name}</div>
            <p>${capabilityDesc(item)}</p>
            <div class="tags">${item.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}</div>
          </div>
          <div class="score">${item.score}</div>
        </article>
      `).join("") || `<div class="panel" style="padding:18px;color:var(--muted)">${t("noMatch")}</div>`;

      document.querySelectorAll(".card").forEach(card => card.addEventListener("click", () => {
        selected = capabilities.find(item => item.name === card.dataset.name);
        renderCards();
        renderDetail();
      }));
    }

    function renderDetail() {
      if (!selected) {
        detail.innerHTML = `<div class="detail-kicker">${t("detailTitle")}</div><h2>${t("detailEmpty")}</h2>`;
        return;
      }
      detail.innerHTML = `
        <div class="detail-kicker">${t("detailTitle")}</div>
        <h2>${capabilityName(selected)}</h2>
        <div class="detail-id">${selected.name}</div>
        <p>${capabilityDesc(selected)}</p>
        <div class="tags" style="margin-top:12px">${selected.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}</div>

        ${selected.sourcePath ? `
        <div class="block">
          <h3>${t("sourceBlock")}</h3>
          <div class="style-note"><strong>${selected.host || "local"}</strong> · ${selected.sourceType || "capability"}<br>${selected.sourcePathDisplay || selected.sourcePath}</div>
          ${Array.isArray(selected.availableIn) && selected.availableIn.length > 1 ? `<div class="source-list"><div class="source-entry"><strong>${t("sourceHosts")}</strong><br>${selected.availableIn.join(", ")}</div></div>` : ""}
        </div>
        ` : ""}

        ${selected.requiresSubskills ? `
        <div class="block">
          <h3>${t("routingNote")}</h3>
          <div class="style-note">${t("subskillNote")}</div>
        </div>
        ` : ""}

        <div class="block">
          <h3>${t("promptBlock")}</h3>
          <div class="prompt">${capabilityPrompt(selected)}</div>
          <button class="copy" id="copyPrompt">${t("copyButton")}</button>
        </div>

        <div class="block">
          <h3>${t("themeBlock")}</h3>
          <div class="style-note"><strong>${activeTheme === "dark" ? t("themeZhDark") : t("themeZhLight")}</strong>：${t("themeNote")}</div>
        </div>
      `;
      document.getElementById("copyPrompt").addEventListener("click", async () => {
        await navigator.clipboard.writeText(capabilityPrompt(selected));
        markUsed(selected);
        document.getElementById("copyPrompt").textContent = t("copiedButton");
        setTimeout(() => document.getElementById("copyPrompt").textContent = t("copyButton"), 1200);
        renderCards();
        renderDetail();
      });
    }

    function renderAll() {
      updateStaticText();
      updateRegistryMeta();
      renderScenes();
      renderCards();
      renderDetail();
    }

    document.querySelectorAll(".seg button").forEach(btn => btn.addEventListener("click", () => {
      document.querySelectorAll(".seg button").forEach(node => node.classList.remove("active"));
      btn.classList.add("active");
      activeEnv = btn.dataset.env;
      const first = filtered()[0];
      if (first) selected = first;
      renderAll();
    }));

    document.querySelectorAll(".theme-toggle button").forEach(btn => btn.addEventListener("click", () => applyTheme(btn.dataset.theme)));

    document.querySelectorAll(".lang-toggle button").forEach(btn => btn.addEventListener("click", () => {
      activeLang = btn.dataset.lang;
      renderAll();
    }));

    document.querySelectorAll(".sort-buttons button").forEach(btn => btn.addEventListener("click", () => {
      document.querySelectorAll(".sort-buttons button").forEach(node => node.classList.remove("active"));
      btn.classList.add("active");
      sortBy = btn.dataset.sort;
      const first = filtered()[0];
      if (first) selected = first;
      renderCards();
      renderDetail();
    }));

    sortDirectionButton.addEventListener("click", () => {
      sortDirection = sortDirection === "desc" ? "asc" : "desc";
      sortDirectionButton.dataset.direction = sortDirection;
      sortDirectionButton.textContent = sortDirection === "desc" ? "↓" : "↑";
      const first = filtered()[0];
      if (first) selected = first;
      renderCards();
      renderDetail();
    });

    search.addEventListener("input", () => {
      const first = filtered()[0];
      if (first) selected = first;
      renderCards();
      renderDetail();
    });

    sortDirectionButton.textContent = "↓";
    applyTheme("light");
    loadRegistry();
  </script>
</body>
</html>
