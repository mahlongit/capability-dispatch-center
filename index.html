<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CD-Center</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --bg-2: #eef2f9;
      --panel: rgba(255, 255, 255, 0.96);
      --panel-2: #fafaf8;
      --panel-3: #ece7ff;
      --ink: #292827;
      --ink-2: #484641;
      --muted: #73706d;
      --line: #e8e4dd;
      --accent: #1b1938;
      --accent-2: #0e3030;
      --chip: #f3f0fb;
      --warn: #8b6431;
      --success: #0e6660;
      --shadow: 0 18px 42px rgba(27, 25, 56, .10);
      --font-display: "Avenir Next", "SF Pro Display", "Segoe UI", sans-serif;
      --font-body: "Avenir Next", "SF Pro Text", "Segoe UI", sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, monospace;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111226;
      --bg-2: #171938;
      --panel: rgba(23, 25, 56, 0.92);
      --panel-2: #1d2143;
      --panel-3: #2d315d;
      --ink: #f8f8fb;
      --ink-2: #d3d0df;
      --muted: #bcbac9;
      --line: #3f3a52;
      --accent: #c9b4fa;
      --accent-2: #8de0d6;
      --chip: #262a4d;
      --warn: #d4ac73;
      --success: #67c5ba;
      --shadow: 0 20px 50px rgba(0, 0, 0, .34);
      --font-display: "Avenir Next", "SF Pro Display", "Segoe UI", sans-serif;
      --font-body: "Avenir Next", "SF Pro Text", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(201, 180, 250, .18), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--ink);
      font: 12px/1.42 var(--font-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 252px minmax(0, 1fr) 340px;
      grid-template-rows: 64px minmax(0, 1fr);
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(27, 25, 56, .98), rgba(47, 44, 90, .92)),
        radial-gradient(circle at top left, rgba(201, 180, 250, .22), transparent 30%);
      backdrop-filter: blur(16px);
    }
    :root[data-theme="dark"] .topbar {
      background:
        linear-gradient(135deg, rgba(14, 12, 31, .98), rgba(25, 22, 52, .95)),
        radial-gradient(circle at top left, rgba(201, 180, 250, .18), transparent 28%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(201, 180, 250, .94), rgba(106, 118, 255, .85));
      border: 1px solid rgba(255,255,255,.14);
      color: #fff;
      font: 700 16px/1 var(--font-display);
    }

    .brand h1 {
      margin: 0;
      color: #fff;
      font: 540 20px/1 var(--font-display);
      letter-spacing: -0.02em;
    }

    .brand p {
      margin: 3px 0 0;
      color: rgba(255,255,255,.74);
      font-size: 11px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .seg,
    .theme-toggle {
      display: inline-grid;
      gap: 4px;
      padding: 4px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      background: rgba(255,255,255,.06);
    }

    .seg {
      grid-template-columns: 132px 76px 76px;
    }

    .theme-toggle {
      grid-template-columns: 56px 56px;
    }

    .lang-toggle {
      display: inline-grid;
      grid-template-columns: 56px 56px;
      gap: 4px;
      padding: 4px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      background: rgba(255,255,255,.06);
    }

    .seg button,
    .theme-toggle button,
    .lang-toggle button {
      min-height: 34px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: rgba(255,255,255,.72);
      font-weight: 700;
    }

    .seg button.active,
    .theme-toggle button.active,
    .lang-toggle button.active {
      background: #fff;
      color: var(--accent);
    }

    :root[data-theme="dark"] .seg button.active,
    :root[data-theme="dark"] .theme-toggle button.active,
    :root[data-theme="dark"] .lang-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    .sidebar,
    .main,
    .detail {
      min-width: 0;
      min-height: 0;
      padding: 12px;
    }

    .sidebar {
      padding-left: 18px;
      overflow: hidden;
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .detail {
      padding-right: 18px;
      overflow: hidden;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--panel);
      box-shadow: var(--shadow);
      min-height: 0;
    }

    .sidebar-panel {
      height: 100%;
      overflow: auto;
      padding: 8px;
      overscroll-behavior: contain;
    }

    .sidebar-section {
      padding: 0 0 8px;
    }

    .sidebar-section + .sidebar-section {
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .panel-title {
      padding: 0 2px 6px;
      color: var(--muted);
      font: 600 12px/1.2 var(--font-display);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .scene-list {
      padding: 0;
      display: grid;
      gap: 2px;
      overflow: auto;
      min-height: 0;
      max-height: none;
    }

    .scene-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      min-height: 26px;
      padding: 4px 9px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      text-align: left;
    }

    .scene-btn.active {
      background: rgba(201, 180, 250, .24);
      color: var(--ink);
    }

    .scene-count {
      color: var(--muted);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .storage {
      padding: 0;
    }

    .storage p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 10.5px;
      line-height: 1.32;
    }

    .storage-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .storage-box {
      padding: 6px 7px;
      border-radius: 8px;
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .storage-box strong {
      display: block;
      font: 600 11px/1.08 var(--font-display);
      overflow-wrap: anywhere;
    }

    .storage-box span {
      color: var(--muted);
      font-size: 9.5px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      flex: none;
    }

    .controls-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      flex: none;
    }

    .sort-panel {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 0 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      background: var(--panel);
    }

    .sort-label {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .sort-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sort-buttons button,
    .sort-direction {
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--muted);
      font-weight: 700;
    }

    .sort-buttons button.active,
    .sort-direction.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .searchbox,
    .hint {
      min-height: 44px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .searchbox {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      background: var(--panel);
    }

    .searchbox input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
    }

    .hint {
      display: none;
      align-items: center;
      padding: 0 14px;
      background: rgba(200, 160, 61, .10);
      color: var(--warn);
      font-size: 13px;
    }

    .cards {
      display: grid;
      gap: 10px;
      overflow: auto;
      min-height: 0;
      padding-right: 4px;
    }

    .card {
      display: grid;
      grid-template-columns: 50px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .card:hover,
    .card.active {
      border-color: rgba(27, 25, 56, .22);
      background: var(--panel-2);
    }

    .icon {
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(201, 180, 250, .34), rgba(255,255,255,1));
      border: 1px solid var(--line);
      font: 700 14px/1 var(--font-display);
    }

    .card h3 {
      margin: 0 0 4px;
      font: 540 16px/1.12 var(--font-display);
      letter-spacing: -0.02em;
    }

    .skill-id {
      margin-bottom: 10px;
      color: var(--muted);
      font: 11px/1.35 var(--font-mono);
    }

    .card p {
      margin: 0 0 12px;
      color: var(--ink-2);
      font-size: 12.5px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      max-width: 210px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score {
      color: var(--accent);
      font: 540 18px/1 var(--font-display);
      font-variant-numeric: tabular-nums;
    }

    .detail-panel {
      padding: 14px;
      height: 100%;
      overflow: auto;
    }

    .detail-kicker {
      color: var(--accent-2);
      font: 600 12px/1.2 var(--font-display);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .detail-panel h2 {
      margin: 10px 0 6px;
      font: 540 20px/1.08 var(--font-display);
      letter-spacing: -0.02em;
    }

    .detail-id {
      margin-bottom: 12px;
      color: var(--muted);
      font: 12px/1.45 var(--font-mono);
    }

    .detail-panel p {
      margin: 0;
      color: var(--ink-2);
      font-size: 13px;
    }

    .block {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .block h3 {
      margin: 0 0 10px;
      font: 600 12px/1.2 var(--font-display);
      color: var(--ink);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .prompt {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(27,25,56,.12);
      background: linear-gradient(180deg, #161733, #0e3030);
      color: #f7f9ff;
      font: 12px/1.7 var(--font-mono);
      white-space: pre-wrap;
    }

    .copy {
      width: 100%;
      min-height: 42px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .copy:hover {
      background: var(--accent-2);
    }

    .style-note {
      padding: 12px;
      border-radius: 10px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--ink-2);
      font-size: 12px;
    }

    .style-note strong {
      color: var(--ink);
    }

    .source-meta {
      padding: 0;
    }

    .source-meta p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .meta-list {
      display: grid;
      gap: 6px;
    }

    .meta-item {
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel-2);
    }

    .meta-item strong {
      display: block;
      color: var(--ink);
      font-size: 10.5px;
      margin-bottom: 2px;
    }

    .meta-item span {
      color: var(--muted);
      font-size: 9.5px;
      word-break: break-word;
      line-height: 1.45;
    }

    .source-list {
      margin-top: 10px;
      display: grid;
      gap: 6px;
    }

    .source-entry {
      padding: 8px 10px;
      border-radius: 10px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      word-break: break-word;
    }

    @media (max-width: 1180px) {
      body {
        height: auto;
        overflow: auto;
      }

      .app {
        grid-template-columns: 240px minmax(0, 1fr);
        grid-template-rows: 72px minmax(0, 1fr);
        height: auto;
      }

      .detail {
        grid-column: 1 / -1;
      }

      .detail-panel,
      .cards,
      .scene-list {
        overflow: visible;
        height: auto;
      }
    }

    @media (max-width: 760px) {
      .app {
        display: block;
      }

      .topbar,
      .sidebar,
      .main,
      .detail {
        padding-left: 16px;
        padding-right: 16px;
      }

      .toolbar,
      .search-row,
      .topbar {
        grid-template-columns: 1fr;
      }

      .toolbar {
        flex-wrap: wrap;
      }

      .seg {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .card {
        grid-template-columns: 48px minmax(0, 1fr);
      }

      .score {
        grid-column: 2;
      }
    }

    @media (max-width: 560px) {
      .sidebar,
      .main,
      .detail {
        padding-top: 14px;
        padding-bottom: 14px;
      }

      .storage-grid {
        grid-template-columns: 1fr;
      }

      .storage-box {
        min-height: 88px;
      }

      .scene-btn {
        padding: 10px 12px;
      }

      .sort-panel {
        min-height: auto;
        align-items: flex-start;
        padding: 12px;
        flex-direction: column;
      }

      .sort-buttons {
        width: 100%;
      }

      .sort-buttons button,
      .sort-direction {
        min-height: 32px;
        font-size: 12px;
      }

      .card {
        padding: 14px;
      }

      .card h3 {
        font-size: 17px;
        line-height: 1.15;
      }

      .card p {
        font-size: 13px;
      }

      .detail-panel h2 {
        font-size: 20px;
      }

      .detail-panel p,
      .style-note,
      .prompt {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">A</div>
        <div>
          <h1>CD-Center</h1>
          <p id="brandSubtitle">通用能力调度台。左边按场景筛选，中间选择能力，右边复制调用提示。</p>
        </div>
      </div>
      <div class="toolbar">
        <div class="seg" aria-label="运行环境切换">
          <button class="active" data-env="all" id="envAll">全部能力</button>
          <button data-env="codex" id="envLocal">CDX</button>
          <button data-env="hermes" id="envRemote">HMS</button>
        </div>
        <div class="lang-toggle" aria-label="语言切换">
          <button class="active" data-lang="zh">中</button>
          <button data-lang="en">En</button>
        </div>
        <div class="theme-toggle" aria-label="主题切换">
          <button data-theme="dark" id="themeDark">黑</button>
          <button class="active" data-theme="light" id="themeLight">白</button>
        </div>
      </div>
    </header>

    <aside class="sidebar">
      <div class="panel sidebar-panel">
        <section class="sidebar-section">
          <div class="panel-title" id="sceneTitle">场景</div>
          <div class="scene-list" id="sceneList"></div>
        </section>
        <section class="sidebar-section storage">
          <div class="panel-title" id="scopeTitle">范围说明</div>
          <p id="scopeText">`全部能力` 会展示本地、远程和共享能力。筛选只改变视图，不会触发任何执行。</p>
          <div class="storage-grid">
            <div class="storage-box"><strong id="boxLocalTitle">本地</strong><span id="boxLocalText">本机脚本或工具</span></div>
            <div class="storage-box"><strong id="boxRemoteTitle">远程</strong><span id="boxRemoteText">API 或托管服务</span></div>
            <div class="storage-box"><strong id="boxSharedTitle">共享</strong><span id="boxSharedText">两类环境均可用</span></div>
            <div class="storage-box"><strong id="boxReadonlyTitle">只读</strong><span id="boxReadonlyText">选择能力不执行</span></div>
          </div>
        </section>
        <section class="sidebar-section source-meta">
          <div class="panel-title" id="sourceTitle">当前数据源</div>
          <p id="registryStatus">启动中，正在检查本机扫描结果。</p>
          <div class="meta-list">
            <div class="meta-item"><strong id="registryModeLabel">数据模式</strong><span id="registryMode">自动检测</span></div>
            <div class="meta-item"><strong id="registryCountLabel">能力数量</strong><span id="registryCount">-</span></div>
            <div class="meta-item"><strong id="registryTimeLabel">扫描时间</strong><span id="registryTime">-</span></div>
          </div>
        </section>
      </div>
    </aside>

    <main class="main">
      <div class="search-row">
        <label class="searchbox">
          <span>⌕</span>
          <input id="search" autocomplete="off" placeholder="搜索任务、能力或标识，例如：改 UI、网页调研、视频生成、代码审查" />
        </label>
        <div class="hint" id="hintText"></div>
      </div>
      <div class="controls-row">
        <div class="sort-panel">
          <span class="sort-label" id="sortLabel">排序</span>
          <div class="sort-buttons">
            <button class="active" data-sort="recent" id="sortRecent">最近使用</button>
            <button data-sort="installed" id="sortInstalled">安装时间</button>
            <button data-sort="name" id="sortName">名称</button>
          </div>
          <button class="sort-direction" id="sortDirection" data-direction="desc">↓</button>
        </div>
      </div>
      <div class="cards" id="cards"></div>
    </main>

    <aside class="detail">
      <div class="panel detail-panel" id="detail"></div>
    </aside>
  </div>

  <script>
    const themes = {
      dark: {
        vars: {
          "--bg":"#0b0d12","--bg-2":"#121621","--panel":"#121722","--panel-2":"#171d2a","--panel-3":"#20283a",
          "--ink":"#eef2ff","--ink-2":"#d5ddf6","--muted":"#8f9bb8","--line":"#293244","--accent":"#7487ff","--accent-2":"#96a7ff","--chip":"#1a2130","--warn":"#c8a03d","--success":"#2bb673"
        }
      },
      light: {
        vars: {
          "--bg":"#f4f6fb","--bg-2":"#edf1f8","--panel":"#ffffff","--panel-2":"#f8faff","--panel-3":"#eef3ff",
          "--ink":"#121722","--ink-2":"#2b3240","--muted":"#687389","--line":"#d8dfec","--accent":"#5d6ff0","--accent-2":"#4a5de2","--chip":"#f0f4fc","--warn":"#9b6d05","--success":"#128250"
        }
      }
    };

    let capabilities = [];
    let registryMeta = null;
    let registrySource = "auto";
    let activeEnv = "all";
    let activeScene = "全部";
    let activeTheme = "light";
    let activeLang = "zh";
    let sortBy = "recent";
    let sortDirection = "desc";
    let selected = null;

    const sceneKeys = ["全部", "UI / 前端", "代码 / 后端", "网页 / 自动化", "视频 / 内容", "知识 / 记忆", "部署", "原生自带", "后装能力", "知识参考"];

    const translations = {
      zh: {
        brandSubtitle: "通用能力调度台。左边按场景筛选，中间选择能力，右边复制调用提示。",
        envAll: "全部能力",
        envLocal: "CDX",
        envRemote: "HMS",
        themeDark: "黑",
        themeLight: "白",

    const sceneList = document.getElementById("sceneList");

    function t(key) {
      return translations[activeLang][key];
    }

    function capabilityName(item) {
      return activeLang === "en" ? (item.displayNameEn || item.displayName || item.name) : (item.displayName || item.displayNameEn || item.name);
    }

    function capabilityDesc(item) {
      return activeLang === "en" ? (item.descEn || item.desc || "") : (item.desc || item.descEn || "");
    }

    function capabilityPrompt(item) {
      return activeLang === "en" ? (item.promptEn || item.prompt || "") : (item.prompt || item.promptEn || "");
    }

    function usageStorageKey(item) {
      return `cd-center:last-used:${item.name}:${item.host || "unknown"}`;
    }

    function getLastUsed(item) {
      return Number(window.localStorage.getItem(usageStorageKey(item)) || 0);
    }

    function markUsed(item) {
      window.localStorage.setItem(usageStorageKey(item), String(Date.now()));
    }

    function applyTheme(themeName) {
      activeTheme = themeName;
      document.documentElement.setAttribute("data-theme", themeName);
      Object.entries(themes[themeName].vars).forEach(([key, value]) => document.documentElement.style.setProperty(key, value));
      document.querySelectorAll(".theme-toggle button").forEach(btn => btn.classList.toggle("active", btn.dataset.theme === themeName));
    }

      document.getElementById("brandSubtitle").textContent = t("brandSubtitle");

      document.getElementById("sortName").textContent = t("sortName");
      document.querySelectorAll(".lang-toggle button").forEach(btn => btn.classList.toggle("active", btn.dataset.lang === activeLang));
    }

    function normalizeRegistry(payload, sourceLabel) {
      if (Array.isArray(payload)) {
        return {
          capabilities: payload,
          meta: {
            label: sourceLabel,
            mode: sourceLabel === "local" ? "local" : "example",
            capabilityCount: payload.length
          }
        };
      }
      return {
        capabilities: Array.isArray(payload.capabilities) ? payload.capabilities : [],
        meta: {
          ...payload.meta,
          label: sourceLabel,
          mode: sourceLabel === "local" ? "local" : "example"
        }
      };
    }

    function updateRegistryMeta() {
      const count = registryMeta?.capabilityCount ?? capabilities.length;
      registryStatus.textContent = registrySource === "local"
        ? t("statusLocal")
        : t("statusExample");
      registryMode.textContent = registrySource === "local" ? t("modeLocal") : t("modeExample");
      registryCount.textContent = String(count);
      registryTime.textContent = registryMeta?.generatedAt || "-";
      hintText.textContent = registrySource === "local"
        ? t("hintLocal")
        : t("hintExample");
    }

    async function fetchRegistry(url, sourceLabel) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`${sourceLabel}:${response.status}`);
      }
      const payload = await response.json();
      return normalizeRegistry(payload, sourceLabel);
    }

    async function loadRegistry() {
      const params = new URLSearchParams(window.location.search);
      const forcedSource = params.get("source");
      let registry;
      if (forcedSource === "example") {
        registry = await fetchRegistry("./capability-registry.public.json", "example");
        registrySource = "example";
      } else if (forcedSource === "local") {
        registry = await fetchRegistry("./capability-registry.local.json", "local");
        registrySource = "local";
      } else {
        try {
          registry = await fetchRegistry("./capability-registry.local.json", "local");
          registrySource = "local";
        } catch (_error) {
          registry = await fetchRegistry("./capability-registry.public.json", "example");
          registrySource = "example";
        }
      }
      capabilities = registry.capabilities;
      registryMeta = registry.meta;
      selected = capabilities[0] || null;
      updateRegistryMeta();
      renderAll();
    }

    function normalizeSceneLabel(item) {
      const category = item.cat || "";
      if (category === "UI / Frontend") return "UI / 前端";
      if (category === "Code / Backend") return "代码 / 后端";
      if (category === "Web / Automation") return "网页 / 自动化";
      if (category === "Video / Content") return "视频 / 内容";
      if (category === "Knowledge / Memory") return "知识 / 记忆";
      if (category === "Deployment") return "部署";
      return category;
    }

    function installKind(item) {
      return String(item.installKind || "").toLowerCase();
    }

    function sceneMatches(item, label) {
      if (label === "全部") return true;
      if (label === "原生自带") return installKind(item) === "native";
      if (label === "后装能力") return ["user-installed", "local-tool", "plugin", "template-library"].includes(installKind(item));
      if (label === "知识参考") return installKind(item) === "reference" || normalizeSceneLabel(item) === "知识 / 记忆";
      return normalizeSceneLabel(item) === label;
    }

    function availableHosts(item) {
      const hosts = Array.isArray(item.availableIn) && item.availableIn.length ? item.availableIn : [item.host || ""];
      return hosts.flatMap(host => String(host).split("/")).map(host => host.trim()).filter(Boolean);
    }

    function hostOk(item) {
      if (activeEnv === "all") return true;
      const hosts = availableHosts(item);
      const hostGroups = {
        codex: ["codex", "agents", "local-cli", "template-library", "local-config"],
        hermes: ["hermes", "agents", "local-cli", "template-library", "local-config"]
      };
      return hosts.some(host => (hostGroups[activeEnv] || [activeEnv]).includes(host));
    }

    function relatedCapabilityKey(item) {
      const name = String(item.name || "").trim().toLowerCase();
      if (name === "design-md" || name === "design-md templates") {
        return "design-md";
      }
      return name || String(capabilityName(item)).trim().toLowerCase();
    }

    function parentBucket(item) {
      const sourcePath = String(item.sourcePathDisplay || item.sourcePath || "");
      if (item.sourceType === "agent") {
        return `${item.host || "agent"}:agents`;
      }
      if (item.sourceType === "mcp") {
        return "local-config:mcp";
      }
      if (item.sourceType === "plugin") {
        return `${item.host || "plugin"}:plugins`;
      }
      const hermesMatch = sourcePath.match(/^~\/\.hermes\/skills\/([^/]+)\/[^/]+\/SKILL\.md$/);
      if (hermesMatch && !["openclaw-imports"].includes(hermesMatch[1])) {
        return `hermes-group:${hermesMatch[1]}`;
      }
      if (sourcePath.includes("/openclaw-imports/")) {
        return "hermes-group:openclaw-imports";
      }
      return "";
    }

    function aggregateParentItems(items) {
      const grouped = new Map();
      const passthrough = [];
      for (const item of items) {
        const bucket = parentBucket(item);
        if (!bucket) {
          passthrough.push(item);
          continue;
        }
        if (!grouped.has(bucket)) {
          const label = bucket.startsWith("generic-skills:")
            ? `${bucket.split(":").pop()} · 通用 Skills`
            : bucket.includes(":agents")
            ? `${item.host === "github-copilot" ? "GitHub Copilot" : capabilityName(item)} Agents`
            : bucket === "local-config:mcp"
              ? "MCP Servers"
              : bucket.endsWith(":plugins")
                ? "Codex Plugins"
                : `${slugToTitle(bucket.split(":").pop() || "parent")} Skills`;
          grouped.set(bucket, {
            ...item,
            name: bucket,
            displayName: label,
            displayNameEn: label,
            icon: iconText(label),
            desc: `父级能力组，已折叠 ${1} 个子项。搜索子项名称时仍会命中这个父级组。`,
            descEn: `Parent capability group with ${1} folded child item. Searching child names still returns this parent group.`,
            tags: listUnique(["parent", ...(item.sceneTags || []), ...(item.tags || []), item.host || "local", item.sourceType || "capability"]),
            sceneTags: listUnique([...(item.sceneTags || []), "父级能力"]),
            searchText: [item.searchText || "", item.name || "", item.displayName || "", item.desc || ""].join(" "),
            localDocs: [...(item.localDocs || [])],
            localDocDisplays: [...(item.localDocDisplays || [])],
            sourceCount: 1,
            childItems: [item],
            requiresSubskills: true,
            repoUrl: item.repoUrl || "",
            installKind: item.installKind,
            installKindLabel: item.installKindLabel,
            installEvidence: item.installEvidence,
          });
          continue;
        }
        const parent = grouped.get(bucket);
        parent.sourceCount += 1;
        parent.childItems.push(item);
        parent.availableIn = listUnique([...(parent.availableIn || []), ...availableHosts(item)]);
        parent.tags = listUnique([...parent.tags, ...(item.sceneTags || []), ...(item.tags || []), item.host || "", item.sourceType || ""]).filter(Boolean);
        parent.sceneTags = listUnique([...(parent.sceneTags || []), ...(item.sceneTags || []), "父级能力"]);
        parent.searchText = [parent.searchText || "", item.searchText || "", item.name || "", item.displayName || "", item.desc || ""].join(" ");
        parent.localDocs = listUnique([...(parent.localDocs || []), ...(item.localDocs || [])]);
        parent.localDocDisplays = listUnique([...(parent.localDocDisplays || []), ...(item.localDocDisplays || [])]);
        if (!parent.repoUrl && item.repoUrl) parent.repoUrl = item.repoUrl;
        parent.installedAt = String(item.installedAt || "") > String(parent.installedAt || "") ? item.installedAt : parent.installedAt;
        parent.desc = `父级能力组，已折叠 ${parent.sourceCount} 个子项。搜索子项名称时仍会命中这个父级组。`;
        parent.descEn = `Parent capability group with ${parent.sourceCount} folded child items. Searching child names still returns this parent group.`;
      }
      return mergeRelatedItems([...passthrough, ...grouped.values()]);
    }

    function mergeRelatedItems(items) {
      const merged = new Map();
      for (const item of items) {
        const key = relatedCapabilityKey(item);
        if (!merged.has(key)) {
          merged.set(key, {
            ...item,
            name: key === "design-md" ? key : item.name,
            displayName: key === "design-md" ? "Design Md" : item.displayName,
            displayNameEn: key === "design-md" ? "Design Md" : item.displayNameEn,
            childItems: Array.isArray(item.childItems) ? [...item.childItems] : [],
            templateItems: Array.isArray(item.templateItems) ? [...item.templateItems] : [],
            availableIn: listUnique([...(item.availableIn || []), ...availableHosts(item)]),
            tags: listUnique([...(item.sceneTags || []), ...(item.tags || []), item.host || "", item.sourceType || ""]).filter(Boolean),
            sceneTags: listUnique([...(item.sceneTags || [])]),
            searchText: item.searchText || "",
            localDocs: [...(item.localDocs || [])],
            localDocDisplays: [...(item.localDocDisplays || [])],
            sourceCount: Number(item.sourceCount || 1),
          });
          continue;
        }
        const parent = merged.get(key);
        parent.availableIn = listUnique([...(parent.availableIn || []), ...(item.availableIn || []), ...availableHosts(item)]);
        parent.tags = listUnique([...(parent.tags || []), ...(item.sceneTags || []), ...(item.tags || []), item.host || "", item.sourceType || ""]).filter(Boolean);
        parent.sceneTags = listUnique([...(parent.sceneTags || []), ...(item.sceneTags || [])]);
        parent.searchText = [parent.searchText || "", item.searchText || "", item.name || "", item.displayName || "", item.desc || ""].join(" ");
        parent.localDocs = listUnique([...(parent.localDocs || []), ...(item.localDocs || [])]);
        parent.localDocDisplays = listUnique([...(parent.localDocDisplays || []), ...(item.localDocDisplays || [])]);
        parent.sourceCount = Number(parent.sourceCount || 1) + Number(item.sourceCount || 1);
        if (!Array.isArray(parent.childItems) || !parent.childItems.length) {
          parent.childItems = [sourceSnapshot(parent)];
        }
        parent.childItems = [
          ...(parent.childItems || []),
          ...(Array.isArray(item.childItems) && item.childItems.length ? item.childItems : [sourceSnapshot(item)])
        ];
        parent.templateItems = mergeTemplateItems([...(parent.templateItems || []), ...(item.templateItems || [])]);
        parent.requiresSubskills = Boolean(parent.requiresSubskills || item.requiresSubskills || parent.childItems.length > 1);
        if (!parent.repoUrl && item.repoUrl) parent.repoUrl = item.repoUrl;
        if (!parent.installKind && item.installKind) parent.installKind = item.installKind;
        if (!parent.installKindLabel && item.installKindLabel) parent.installKindLabel = item.installKindLabel;
        if (!parent.installEvidence && item.installEvidence) parent.installEvidence = item.installEvidence;
        if (String(item.installedAt || "") > String(parent.installedAt || "")) {
          parent.installedAt = item.installedAt;
        }
        parent.desc = parent.templateItems && parent.templateItems.length
          ? `本地 design-md 能力，已合并 skill、CLI 和模板库来源，包含 ${parent.templateItems.length} 套可用设计模板。`
          : parent.childItems.length > 1
          ? `同名能力已合并 ${parent.childItems.length} 个来源。搜索子项名称时仍会命中这个入口。`
          : parent.desc;
        parent.descEn = parent.templateItems && parent.templateItems.length
          ? `Local design-md capability merged from skill, CLI, and template-library sources, with ${parent.templateItems.length} available design templates.`
          : parent.childItems.length > 1
          ? `Merged ${parent.childItems.length} sources for the same capability. Searching child names still returns this entry.`
          : parent.descEn;
      }
      return [...merged.values()];
    }

    function sourceSnapshot(item) {
      const snapshot = { ...item };
      delete snapshot.childItems;
      delete snapshot.templateItems;
      return snapshot;
    }

    function mergeTemplateItems(items) {
      const seen = new Set();
      return items.filter(item => {
        const key = String(item.name || "").toLowerCase();
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      }).sort((a, b) => String(a.name).localeCompare(String(b.name)));
    }

    function slugToTitle(value) {
      return String(value || "")
        .replace(/[-_./]+/g, " ")
        .trim()
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function iconText(name) {
      return (String(name || "CAP").toUpperCase().match(/[A-Z0-9]/g) || ["C", "A", "P"]).slice(0, 3).join("");
    }

    function listUnique(values) {
      return [...new Set(values.filter(Boolean))];
    }

    function filtered() {
      const q = search.value.trim().toLowerCase();
      const rawList = capabilities.filter(item => {
        const envOk = hostOk(item);
        const sceneOk = sceneMatches(item, activeScene);
        const childText = Array.isArray(item.childItems)
          ? item.childItems.map(child => [child.name, child.displayName, child.desc, child.sourcePathDisplay].join(" ")).join(" ")
          : "";
        const qOk = !q || [item.name, item.displayName, item.displayNameEn || "", item.desc || "", item.descEn || "", item.cat, item.sourceType || "", item.host || "", item.sourcePath || "", item.sourcePathDisplay || "", item.repoUrl || "", item.installKind || "", item.installKindLabel || "", item.metadataCategory || "", item.categorySource || "", item.descSource || "", item.searchText || "", childText, ...(item.availableIn || []), ...(item.sceneTags || []), ...(item.tags || []), ...(item.localDocDisplays || [])].join(" ").toLowerCase().includes(q);
        return envOk && sceneOk && qOk;
      });
      const list = aggregateParentItems(rawList);
      const direction = sortDirection === "asc" ? 1 : -1;
      return list.sort((a, b) => {
        if (sortBy === "name") {
          return capabilityName(a).localeCompare(capabilityName(b), activeLang === "en" ? "en" : "zh") * direction;
        }
        if (sortBy === "installed") {
          const aTime = Date.parse(a.installedAt || 0) || 0;
          const bTime = Date.parse(b.installedAt || 0) || 0;
          return (aTime - bTime) * direction;
        }
        const aUsed = getLastUsed(a);
        const bUsed = getLastUsed(b);
        if (aUsed !== bUsed) {
          return (aUsed - bUsed) * direction;
        }
        const aInstalled = Date.parse(a.installedAt || 0) || 0;
        const bInstalled = Date.parse(b.installedAt || 0) || 0;
        return (aInstalled - bInstalled) * direction;
      });
    }

    function renderScenes() {
      sceneList.innerHTML = sceneKeys.map((label) => {
        const count = aggregateParentItems(capabilities.filter(item => {
          const envOk = hostOk(item);
          return envOk && sceneMatches(item, label);
        })).length;
        return `<button class="scene-btn ${label === activeScene ? "active" : ""}" data-scene="${label}"><span>${translations[activeLang].sceneLabels[label] || label}</span><span class="scene-count">${count}</span></button>`;
      }).join("");
      document.querySelectorAll(".scene-btn").forEach(btn => btn.addEventListener("click", () => {
        activeScene = btn.dataset.scene;
        const first = filtered()[0];
        if (first) selected = first;
        renderAll();
      }));
    }

    function renderCards() {
      const list = filtered();
      cards.innerHTML = list.map(item => {
        const cardTags = listUnique([...(item.sceneTags || []), ...(item.tags || [])]).slice(0, 7);
        return `
        <article class="card ${selected && item.name === selected.name ? "active" : ""}" data-name="${item.name}">
          <div class="icon">${item.icon}</div>
          <div>
            <h3>${capabilityName(item)}</h3>
            <div class="skill-id">${item.name}</div>
            <p>${capabilityDesc(item)}</p>
            <div class="tags">${cardTags.map(tag => `<span class="tag">${tag}</span>`).join("")}${item.sourceCount > 1 ? `<span class="tag">${item.sourceCount} sources</span>` : ""}${Array.isArray(item.templateItems) && item.templateItems.length ? `<span class="tag">${item.templateItems.length} templates</span>` : ""}</div>
          </div>
          <div class="score">${item.score}</div>
        </article>
      `}).join("") || `<div class="panel" style="padding:18px;color:var(--muted)">${t("noMatch")}</div>`;

      document.querySelectorAll(".card").forEach(card => card.addEventListener("click", () => {
        selected = filtered().find(item => item.name === card.dataset.name);
        renderCards();
        renderDetail();
      }));
    }

    function renderDetail() {
      if (!selected) {
        detail.innerHTML = `<div class="detail-kicker">${t("detailTitle")}</div><h2>${t("detailEmpty")}</h2>`;
        return;
      }
      detail.innerHTML = `
        <div class="detail-kicker">${t("detailTitle")}</div>
        <h2>${capabilityName(selected)}</h2>
        <div class="detail-id">${selected.name}</div>
        <p>${capabilityDesc(selected)}</p>
        <div class="tags" style="margin-top:12px">${listUnique([...(selected.sceneTags || []), ...(selected.tags || [])]).map(tag => `<span class="tag">${tag}</span>`).join("")}</div>

        ${selected.sourcePath ? `
        <div class="block">
          <h3>${t("sourceBlock")}</h3>
          <div class="style-note"><strong>${selected.host || "local"}</strong> · ${selected.sourceType || "capability"} · ${selected.installKindLabel || selected.installKind || "本机发现"}<br>${selected.sourcePathDisplay || selected.sourcePath}${selected.repoUrl ? `<br><a href="${selected.repoUrl}" target="_blank" rel="noreferrer">${selected.repoUrl}</a>` : ""}${selected.installEvidence ? `<br>${selected.installEvidence}` : ""}</div>
          ${Array.isArray(selected.availableIn) && selected.availableIn.length > 1 ? `<div class="source-list"><div class="source-entry"><strong>${t("sourceHosts")}</strong><br>${selected.availableIn.join(", ")}</div></div>` : ""}
          ${Array.isArray(selected.localDocDisplays) && selected.localDocDisplays.length ? `<div class="source-list"><div class="source-entry"><strong>${activeLang === "en" ? "Local docs read" : "已读取本地说明"}</strong><br>${selected.localDocDisplays.slice(0, 8).join("<br>")}${selected.localDocDisplays.length > 8 ? `<br>+ ${selected.localDocDisplays.length - 8} more docs` : ""}</div></div>` : ""}
          ${(selected.categorySource || selected.descSource) ? `<div class="source-list"><div class="source-entry"><strong>${activeLang === "en" ? "Evidence" : "判断依据"}</strong><br>category: ${selected.categorySource || "-"}<br>description: ${selected.descSource || "-"}</div></div>` : ""}
          ${Array.isArray(selected.childItems) && selected.childItems.length ? `<div class="source-list">${selected.childItems.slice(0, 16).map(child => `<div class="source-entry">${capabilityName(child)} · ${child.name}<br>${child.sourcePathDisplay || child.sourcePath || child.host || ""}</div>`).join("")}${selected.childItems.length > 16 ? `<div class="source-entry">+ ${selected.childItems.length - 16} more sources</div>` : ""}</div>` : ""}
        </div>
        ` : ""}

        ${Array.isArray(selected.templateItems) && selected.templateItems.length ? `
        <div class="block">
          <h3>${activeLang === "en" ? "Template Library" : "模板清单"}</h3>
          <div class="source-list">${selected.templateItems.slice(0, 80).map(template => `<div class="source-entry">${template.displayName || template.name} · ${template.name}</div>`).join("")}${selected.templateItems.length > 80 ? `<div class="source-entry">+ ${selected.templateItems.length - 80} more templates</div>` : ""}</div>
        </div>
        ` : ""}

        ${selected.requiresSubskills ? `
        <div class="block">
          <h3>${t("routingNote")}</h3>
          <div class="style-note">${t("subskillNote")}</div>
        </div>
        ` : ""}

        <div class="block">
          <h3>${t("promptBlock")}</h3>
          <div class="prompt">${capabilityPrompt(selected)}</div>
          <button class="copy" id="copyPrompt">${t("copyButton")}</button>
        </div>

        <div class="block">
          <h3>${t("themeBlock")}</h3>
          <div class="style-note"><strong>${activeTheme === "dark" ? t("themeZhDark") : t("themeZhLight")}</strong>：${t("themeNote")}</div>
        </div>
      `;
      document.getElementById("copyPrompt").addEventListener("click", async () => {
        await navigator.clipboard.writeText(capabilityPrompt(selected));
        markUsed(selected);
        document.getElementById("copyPrompt").textContent = t("copiedButton");
        setTimeout(() => document.getElementById("copyPrompt").textContent = t("copyButton"), 1200);
        renderCards();
        renderDetail();
      });
    }

    function renderAll() {
      updateStaticText();
      updateRegistryMeta();
      renderScenes();
      renderCards();
      renderDetail();
    }

    document.querySelectorAll(".seg button").forEach(btn => btn.addEventListener("click", () => {
      document.querySelectorAll(".seg button").forEach(node => node.classList.remove("active"));
      btn.classList.add("active");
      activeEnv = btn.dataset.env;
      const first = filtered()[0];
      if (first) selected = first;
      renderAll();
    }));

    document.querySelectorAll(".theme-toggle button").forEach(btn => btn.addEventListener("click", () => applyTheme(btn.dataset.theme)));

    document.querySelectorAll(".lang-toggle button").forEach(btn => btn.addEventListener("click", () => {
      activeLang = btn.dataset.lang;
      renderAll();
    }));

    document.querySelectorAll(".sort-buttons button").forEach(btn => btn.addEventListener("click", () => {
      document.querySelectorAll(".sort-buttons button").forEach(node => node.classList.remove("active"));
      btn.classList.add("active");
      sortBy = btn.dataset.sort;
      const first = filtered()[0];
      if (first) selected = first;
      renderCards();
      renderDetail();
    }));

    sortDirectionButton.addEventListener("click", () => {
      sortDirection = sortDirection === "desc" ? "asc" : "desc";
      sortDirectionButton.dataset.direction = sortDirection;
      sortDirectionButton.textContent = sortDirection === "desc" ? "↓" : "↑";
      const first = filtered()[0];
      if (first) selected = first;
      renderCards();
      renderDetail();
    });

    search.addEventListener("input", () => {
      const first = filtered()[0];
      if (first) selected = first;
      renderCards();
      renderDetail();
    });

    sortDirectionButton.textContent = "↓";
    applyTheme("light");
    loadRegistry();
  </script>
</body>
</html>
